server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: risk-engine
  
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/parametrix}
      auto-index-creation: true
  
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: risk-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.parametrix.common.events
        spring.json.type.mapping: >
          worker.registered:com.parametrix.common.events.WorkerRegisteredEvent,
          policy.purchased:com.parametrix.common.events.PolicyPurchasedEvent,
          environment.disruption:com.parametrix.common.events.EnvironmentDisruptionEvent,
          claim.initiated:com.parametrix.common.events.ClaimInitiatedEvent,
          claim.validated:com.parametrix.common.events.ClaimValidatedEvent,
          claim.approved:com.parametrix.common.events.ClaimApprovedEvent,
          payout.completed:com.parametrix.common.events.PayoutCompletedEvent

risk:
  base-premium: 20.00
  min-premium: 15.00
  max-premium: 50.00
  default-coverage: 800.00
  
  thresholds:
    rainfall-high: 50.0     # mm per hour
    aqi-hazardous: 300      # AQI index
    temperature-high: 42    # Celsius
    temperature-low: 5      # Celsius

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.parametrix: DEBUG
