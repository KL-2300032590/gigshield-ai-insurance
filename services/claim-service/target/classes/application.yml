server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: claim-service
  
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://charan:charan825@myatlasclusteredu.eqstcqn.mongodb.net/?appName\=myAtlasClusterEDU}
      auto-index-creation: true
      database: gig-shield
    
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: claim-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.gigshield.common.events

claim:
  default-payout-percentage: 100  # Percentage of coverage limit

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.gigshield: DEBUG
