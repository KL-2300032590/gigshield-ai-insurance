spring:
  application:
    name: admin-simulator

  # MongoDB Configuration
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://parametrix:parametrix123@localhost:27017/parametrix?authSource=admin}

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        spring.json.type.mapping: >
          environment.disruption:com.parametrix.common.events.EnvironmentDisruptionEvent

# Server Configuration
server:
  port: ${SERVER_PORT:8091}

# Logging
logging:
  level:
    com.parametrix.simulator: DEBUG
    org.springframework.kafka: INFO
    org.mongodb.driver: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

services:
  health:
    api-gateway-url: ${API_GATEWAY_URL:http://api-gateway:8080}
    risk-engine-url: ${RISK_ENGINE_URL:http://risk-engine:8081}
    trigger-engine-url: ${TRIGGER_ENGINE_URL:http://trigger-engine:8082}
    fraud-detection-url: ${FRAUD_DETECTION_URL:http://fraud-detection:8083}
    claim-service-url: ${CLAIM_SERVICE_URL:http://claim-service:8084}
    payout-service-url: ${PAYOUT_SERVICE_URL:http://payout-service:8085}
    admin-simulator-url: ${ADMIN_SIMULATOR_URL:http://admin-simulator:8091}
