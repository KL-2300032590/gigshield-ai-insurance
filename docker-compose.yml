version: '3.8'

services:
  # MongoDB - Primary Database
  mongodb:
    image: mongo:7.0
    container_name: parametrix-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: parametrix
      MONGO_INITDB_ROOT_PASSWORD: parametrix123
      MONGO_INITDB_DATABASE: parametrix
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parametrix-network

  # Redis - Caching Layer
  redis:
    image: redis:7.2-alpine
    container_name: parametrix-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parametrix-network

  # Zookeeper - Kafka Dependency
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: parametrix-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parametrix-network

  # Kafka - Event Streaming
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: parametrix-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - parametrix-network

  # Kafka UI - Management Interface
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: parametrix-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: parametrix
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - parametrix-network

  # API Gateway Service
  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    platform: linux/arm64  # Explicit platform for multi-arch support
    container_name: parametrix-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://parametrix:parametrix123@mongodb:27017/parametrix?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: parametrix-jwt-secret-key-for-development-only-change-in-production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - parametrix-network

  # Risk Engine Service
  risk-engine:
    build:
      context: ./services
      dockerfile: risk-engine/Dockerfile
    platform: linux/arm64  # Explicit platform for multi-arch support
    container_name: parametrix-risk-engine
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://parametrix:parametrix123@mongodb:27017/parametrix?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8081
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - parametrix-network

  # Trigger Engine Service
  trigger-engine:
    build:
      context: ./services
      dockerfile: trigger-engine/Dockerfile
    platform: linux/arm64  # Explicit platform for multi-arch support
    container_name: parametrix-trigger-engine
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://parametrix:parametrix123@mongodb:27017/parametrix?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8082
      WEATHER_API_KEY: ${WEATHER_API_KEY:-demo}
      AQI_API_KEY: ${AQI_API_KEY:-demo}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - parametrix-network

  # Fraud Detection Service
  fraud-detection:
    build:
      context: ./services
      dockerfile: fraud-detection/Dockerfile
    platform: linux/arm64  # Explicit platform for multi-arch support
    container_name: parametrix-fraud-detection
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://parametrix:parametrix123@mongodb:27017/parametrix?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8083
      FRAUD_LOCATION_RADIUS_KM: 50
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - parametrix-network

  # Claim Service
  claim-service:
    build:
      context: ./services
      dockerfile: claim-service/Dockerfile
    platform: linux/arm64  # Explicit platform for multi-arch support
    container_name: parametrix-claim-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://parametrix:parametrix123@mongodb:27017/parametrix?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8084
      CLAIM_LOCATION_VALIDATION_RADIUS_KM: 50
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - parametrix-network

  # Payout Service
  payout-service:
    build:
      context: ./services
      dockerfile: payout-service/Dockerfile
    platform: linux/arm64  # Explicit platform for multi-arch support
    container_name: parametrix-payout-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://parametrix:parametrix123@mongodb:27017/parametrix?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8085
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_demo}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-demo_secret}
      PAYOUT_LOCATION_VALIDATION_RADIUS_KM: 50
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - parametrix-network

  # Admin Simulator Service
  admin-simulator:
    build:
      context: ./services
      dockerfile: admin-simulator/Dockerfile
    platform: linux/arm64  # Explicit platform for multi-arch support
    container_name: parametrix-admin-simulator
    ports:
      - "8091:8091"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://parametrix:parametrix123@mongodb:27017/parametrix?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8091
      API_GATEWAY_URL: http://api-gateway:8080
      RISK_ENGINE_URL: http://risk-engine:8081
      TRIGGER_ENGINE_URL: http://trigger-engine:8082
      FRAUD_DETECTION_URL: http://fraud-detection:8083
      CLAIM_SERVICE_URL: http://claim-service:8084
      PAYOUT_SERVICE_URL: http://payout-service:8085
      ADMIN_SIMULATOR_URL: http://admin-simulator:8091
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - parametrix-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    platform: linux/arm64  # Explicit platform for multi-arch support
    container_name: parametrix-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - parametrix-network

  # Admin Dashboard
  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: parametrix-admin-dashboard
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8091
      NEXT_PUBLIC_SIMULATOR_URL: http://localhost:8091
    depends_on:
      - admin-simulator
    networks:
      - parametrix-network

volumes:
  mongodb_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  parametrix-network:
    driver: bridge
